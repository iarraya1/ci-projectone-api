openapi: 3.0.0
info:
  title: BooksAPI
  version: 1.0.0
  description: RESTful Bookstore API for managing books and authors.

servers:
  - url: http://localhost:10000
    description: Local (developer machine)

  - url: https://ci-projectone-api.onrender.com
    description: Production (Render deployment)

paths:
  /health:
    get:
      summary: Health Check
      responses:
        '200':
          description: API health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /books:
    get:
      summary: List all books
      responses:
        '200':
          description: A list of books
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Book'

    post:
      summary: Create a book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookCreateRequest'
            example:
              title: Before They Are Hanged
              author: Joe Abercrombie
              price: 17.99
      responses:
        '201':
          description: Book created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /books/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Book ID

    get:
      summary: Retrieve a book by ID
      responses:
        '200':
          description: Book found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '404':
          description: Book not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Fully update a book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookCreateRequest'
            example:
              title: Rage
              author: Wilbur Smith
              price: 18.99
      responses:
        '200':
          description: Book updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Book not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      summary: Partially update a book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookPatchRequest'
            example:
              price: 11.99
      responses:
        '200':
          description: Book updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '404':
          description: Book not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Delete a book
      responses:
        '204':
          description: Book deleted successfully
        '404':
          description: Book not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /authors:
    get:
      summary: List all authors
      responses:
        '200':
          description: A list of authors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Author'

components:
  schemas:
    Book:
      type: object
      required:
        - id
        - title
        - authorId
        - author
        - price
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Before They Are Hanged
        authorId:
          type: integer
          example: 3
        author:
          type: string
          example: Joe Abercrombie
        price:
          type: number
          example: 17.99

    Author:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: George Orwell

    BookCreateRequest:
      type: object
      required:
        - title
        - author
      properties:
        title:
          type: string
          example: Before They Are Hanged
        author:
          type: string
          example: Joe Abercrombie
        price:
          type: number
          example: 17.99

    BookPatchRequest:
      type: object
      properties:
        title:
          type: string
          example: Updated Book Title
        author:
          type: string
          example: New Author
        price:
          type: number
          example: 11.99

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: OK
        uptime:
          type: number
          example: 123.45
        timestamp:
          type: string
          example: 2026-05-06T14:30:00.000Z

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Book not found
