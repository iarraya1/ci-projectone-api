name: CI - Run API tests

on: 
  push:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install
      
      - name: Start server (background) and wait for health
        run: |
          npm start &
          for i in {1..15}; do
            curl -sSf http://localhost:10000/health && break
            sleep 1
          done

      - name: Install Newman
        run: npm install -g newman
